services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ara_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend-api:
    build:
      context: ../apps/backend-api
      dockerfile: Dockerfile
    container_name: ara_backend_api
    environment:
      - APP_ENV=dev
      - SQLITE_PATH=/app/var/app.db
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - JWT_SECRET=change-me-dev-secret
    ports:
      - "8000:8000"
    volumes:
      - ../apps/backend-api:/app
      - ../data:/data
      - backend_var:/app/var
    depends_on:
      - qdrant

volumes:
  qdrant_data:
  backend_var: