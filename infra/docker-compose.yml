services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ara_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend-api:
    build:
      context: ../apps/backend-api
      dockerfile: Dockerfile
    container_name: ara_backend_api
    environment:
      - APP_ENV=dev
      - SQLITE_PATH=/app/var/app.db
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - JWT_SECRET=change-me-dev-secret-please-use-32chars!
      - LMSTUDIO_BASE_URL=http://host.docker.internal:1234/v1
      - LMSTUDIO_API_KEY=lm-studio
      - LMSTUDIO_CHAT_MODEL=dolphin3.0-llama3.1-8b
      - LMSTUDIO_EMBED_MODEL=text-embedding-nomic-embed-text-v1.5
    ports:
      - "8000:8000"
    volumes:
      - ../apps/backend-api:/app
      - ../data:/data
      - backend_var:/app/var
    depends_on:
      - qdrant

volumes:
  qdrant_data:
  backend_var: